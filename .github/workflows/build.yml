name: Build KSO 64bit Offline
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Offline Dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "Resources"

          # 1. yt-dlp
          Invoke-WebRequest "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "Resources\yt-dlp.exe"

          # 2. ffmpeg
          Invoke-WebRequest "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive "ffmpeg.zip" "ffmpeg_temp"
          Get-ChildItem "ffmpeg_temp\ffmpeg-*\bin\ffmpeg.exe" | Copy-Item -Destination "Resources\ffmpeg.exe"

          # 3. WebView2 Runtime Offline Installer كامل 120MB
          Invoke-WebRequest "https://go.microsoft.com/fwlink/p/?LinkId=2124703&channel=stable&version=latest&architecture=x64&language=en" -OutFile "Resources\MicrosoftEdgeWebView2RuntimeInstallerX64.exe"

      - name: Restore
        run: dotnet restore KSO.csproj

      - name: Publish SelfContained
        shell: pwsh
        run: |
          # SelfContained = كل الدوت نت 8 جوه. SingleFile = false عشان ميضربش مع EmbeddedResource
          dotnet publish KSO.csproj -c Release -r win-x64 -p:PublishSingleFile=false -p:SelfContained=true -p:IncludeNativeLibrariesForSelfExtract=true -o output\portable

          # شلنا سطر Copy-Item بتاع Resources لاننا بنفك من AppData

      - name: Zip Portable
        run: Compress-Archive -Path output\portable\* -DestinationPath KSO-Portable-x64-Offline.zip

      - name: Install Inno
        run: choco install innosetup -y

      - name: Create Setup.exe with Inno - Offline
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $iss = @"
          #define MyAppName "KSO Download Turbo Ultra"
          #define MyAppVersion "$version"
          [Setup]
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          DefaultDirName={autopf}\KSO
          DefaultGroupName=KSO
          OutputBaseFilename=KSO-Setup-x64-Offline
          Compression=lzma2/ultra64
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64
          WizardStyle=modern
          SetupIconFile=Resources\icon.ico
          UninstallDisplayIcon={app}\KSO.exe

          [Files]
          ; كل ملفات البرنامج من فولدر publish
          Source: "output\portable\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs
          ; WebView2 Offline Installer من فولدر Resources الاصلي
          Source: "Resources\MicrosoftEdgeWebView2RuntimeInstallerX64.exe"; DestDir: "{tmp}"; Flags: deleteafterinstall

          [Run]
          ; تسطيب WebView2 في الصمت بدون نت
          Filename: "{tmp}\MicrosoftEdgeWebView2RuntimeInstallerX64.exe"; Parameters: "/silent /install"; StatusMsg: "جاري تثبيت WebView2 Runtime..."; Flags: waituntilterminated
          ; تشغيل البرنامج بعد التسطيب
          Filename: "{app}\KSO.exe"; Description: "تشغيل KSO الآن"; Flags: nowait postinstall skipifsilent

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\KSO.exe"
          Name: "{commondesktop}\{#MyAppName}"; Filename: "{app}\KSO.exe"
          "@
          $iss | Out-File setup.iss -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: KSO-Builds-Offline
          path:
            KSO-Portable-x64-Offline.zip
            KSO-Setup-x64-Offline.exe

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files:
            KSO-Portable-x64-Offline.zip
            KSO-Setup-x64-Offline.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
