name: Build KSO 64bit Offline Full
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Offline Dependencies FULL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "Resources"
          Invoke-WebRequest "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "Resources\yt-dlp.exe"
          Invoke-WebRequest "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive "ffmpeg.zip" "ffmpeg_temp"
          Get-ChildItem "ffmpeg_temp\ffmpeg-*\bin\ffmpeg.exe" | Copy-Item -Destination "Resources\ffmpeg.exe"
          Invoke-WebRequest "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "Resources\MicrosoftEdgeWebView2RuntimeInstallerX64.exe"

      - name: CREATE csproj WITH CORRECT WEBVIEW2 REFERENCE
        shell: pwsh
        run: |
          $csprojContent = @'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>WinExe</OutputType>
              <TargetFramework>net8.0-windows</TargetFramework>
              <UseWPF>true</UseWPF>
              <UseWindowsForms>true</UseWindowsForms>
              <PlatformTarget>x64</PlatformTarget>
              <Nullable>enable</Nullable>
              <ImplicitUsings>enable</ImplicitUsings>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Microsoft.WebView2" Version="1.0.4078.44" />
              <PackageReference Include="Xceed.Wpf.Toolkit" Version="4.6.24151.1544" />
            </ItemGroup>
            <ItemGroup>
              <EmbeddedResource Include="Resources\yt-dlp.exe" />
              <EmbeddedResource Include="Resources\ffmpeg.exe" />
              <EmbeddedResource Include="Resources\config.json" />
              <EmbeddedResource Include="Resources\lang.json" />
            </ItemGroup>
          </Project>
          '@
          $csprojContent | Out-File "KSO.csproj" -Encoding UTF8 -Force

      - name: FIX MainWindow.xaml FOR WEBVIEW2
        shell: pwsh
        run: |
          $xamlPath = "MainWindow.xaml"
          $content = Get-Content $xamlPath -Raw
          if ($content -notlike '*xmlns:wpf=*') {
            $content = $content -replace '<Window ', '<Window xmlns:wpf="clr-namespace:Microsoft.WebView2.Wpf;assembly=Microsoft.WebView2.Wpf" '
          }
          $content = $content -replace '<WebView2', '<wpf:WebView2'
          $content = $content -replace '</WebView2>', '</wpf:WebView2>'
          $content | Out-File $xamlPath -Encoding UTF8

      - name: Restore
        run: dotnet restore KSO.csproj --source https://api.nuget.org/v3/index.json

      - name: Publish SelfContained
        shell: pwsh
        run: dotnet publish KSO.csproj -c Release -r win-x64 -p:PublishSingleFile=false -p:SelfContained=true -p:IncludeNativeLibrariesForSelfExtract=true -o output\portable

      - name: Zip Portable
        run: Compress-Archive -Path output\portable\* -DestinationPath KSO-Portable-x64-Offline.zip
      - name: Install Inno
        run: choco install innosetup -y
      - name: Create Setup.exe with Inno - OFFLINE FULL
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $iss = @"
          #define MyAppName "KSO Download Turbo Ultra"
          #define MyAppVersion "$version"
          [Setup]
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          DefaultDirName={autopf}\KSO
          DefaultGroupName=KSO
          OutputBaseFilename=KSO-Setup-x64-Offline-Full
          Compression=lzma2/ultra64
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64
          WizardStyle=modern
          SetupIconFile=Resources\icon.ico
          UninstallDisplayIcon={app}\KSO.exe
          [Files]
          Source: "output\portable\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs
          Source: "Resources\MicrosoftEdgeWebView2RuntimeInstallerX64.exe"; DestDir: "{tmp}"; Flags: deleteafterinstall
          [Run]
          Filename: "{tmp}\MicrosoftEdgeWebView2RuntimeInstallerX64.exe"; Parameters: "/silent /install"; StatusMsg: "جاري تثبيت WebView2 Runtime بدون نت..."; Flags: waituntilterminated
          Filename: "{app}\KSO.exe"; Description: "تشغيل KSO الآن"; Flags: nowait postinstall skipifsilent
          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\KSO.exe"
          Name: "{commondesktop}\{#MyAppName}"; Filename: "{app}\KSO.exe"
          "@
          $iss | Out-File setup.iss -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
      - uses: actions/upload-artifact@v4
        with:
          name: KSO-Builds-Offline-Full
          path:
            KSO-Portable-x64-Offline.zip
            KSO-Setup-x64-Offline-Full.exe
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files:
            KSO-Portable-x64-Offline.zip
            KSO-Setup-x64-Offline-Full.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
